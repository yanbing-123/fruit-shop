<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>水果商城</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/toolbar.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="container header-inner">
      <h1 class="logo">🍎 水果商城</h1>
      <button class="cart-btn" onclick="toggleCart()">
        🛒 购物车
        <span class="cart-badge" id="cartBadge">0</span>
      </button>
    </div>
  </header>

  <!-- 商品列表 -->
  <main class="container">
    <h2 class="section-title">🍇 精选水果</h2>
    <div class="product-grid" id="productGrid"></div>
  </main>

  <!-- 购物车遮罩 -->
  <div class="cart-overlay" id="cartOverlay" onclick="toggleCart()"></div>

  <!-- 购物车侧边栏 -->
  <aside class="cart-sidebar" id="cartSidebar">
    <div class="cart-header">
      <h3>🛒 我的购物车</h3>
      <button class="cart-close" onclick="toggleCart()">✕</button>
    </div>
    <div class="cart-items" id="cartItems"></div>
    <div class="cart-footer">
      <div class="cart-total">
        <span>总计：</span>
        <span class="total-price" id="totalPrice">¥0.00</span>
      </div>
      <button class="btn-clear" onclick="clearCart()">清空购物车</button>
      <button class="btn-checkout" id="checkoutBtn" onclick="openCheckout()">去结算</button>
    </div>
  </aside>

  <!-- 结算弹窗 -->
  <div class="modal-overlay" id="modalOverlay" onclick="closeCheckout()"></div>
  <div class="modal checkout-modal" id="checkoutModal">
    <div class="modal-header">
      <h3>📋 填写订单信息</h3>
      <button class="modal-close" onclick="closeCheckout()">✕</button>
    </div>
    <form class="checkout-form" id="checkoutForm" onsubmit="submitOrder(event)">
      <div class="form-group">
        <label for="userName">姓名 <span class="required">*</span></label>
        <input type="text" id="userName" placeholder="请输入收货人姓名" maxlength="20">
        <span class="error-msg" id="errorName"></span>
      </div>
      <div class="form-group">
        <label for="userPhone">手机号 <span class="required">*</span></label>
        <input type="tel" id="userPhone" placeholder="请输入11位手机号" maxlength="11">
        <span class="error-msg" id="errorPhone"></span>
      </div>
      <div class="form-group">
        <label for="userAddress">收货地址 <span class="required">*</span></label>
        <textarea id="userAddress" placeholder="请输入详细收货地址" rows="2" maxlength="100"></textarea>
        <span class="error-msg" id="errorAddress"></span>
      </div>
      <div class="form-summary">
        <p>共 <strong id="summaryCount">0</strong> 件商品，合计：<strong id="summaryTotal">¥0.00</strong></p>
      </div>
      <button type="submit" class="btn-submit">确认提交订单</button>
    </form>
  </div>

  <!-- 订单成功弹窗 -->
  <div class="modal-overlay" id="successOverlay" onclick="closeSuccess()"></div>
  <div class="modal success-modal" id="successModal">
    <div class="success-icon">🎉</div>
    <h3>下单成功！</h3>
    <p class="order-no" id="orderNo">订单编号：—</p>
    <p class="success-tip">感谢您的购买，水果新鲜配送中！</p>
    <button class="btn-submit" onclick="closeSuccess()">继续购物</button>
  </div>

  <script src="js/app.js"></script>
  <script src="js/search.js"></script>
</body>
</html>
